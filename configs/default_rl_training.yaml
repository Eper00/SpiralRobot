policy:
  net_arch: [128, 128]
  activation_fn: tanh
  learning_rate: "0.0003904770450788824"
rl_env:
  # ----------------------------
  # MuJoCo simulation settings
  # ----------------------------
  xml_file: "/home/tomi/SpiralRobot/assets/simulation/tentacle_2D-v3/robot.xml"
  # for lesson_1 and lesson_2 it is 2.5
  simulation_length_seconds: 5
  time_between_steps_seconds: 0.02

  cable_lengths: [0.185632848, 1.160205301]
  actuator_limits: [[-1, 1], [-1, 1]]
  warm_start: True
  prev_ppo_path: "/home/tomi/SpiralRobot/results/run_20260614_142507_rl_lesson_2/models/best_model/best_model.zip"
  # ----------------------------
  # Reward shaping
  # ----------------------------
  reward_distance_scale: 4
  seed: 0

  # ----------------------------
  # Environment objects
  # ----------------------------

  workspace_center: [0., 0.9]
  workspace_inner_radius: 0.6
  workspace_outer_radius: 0.2
  # ----------------------------
  # Observation settings
  # ----------------------------
  num_frames: 20
  include_actuator_lengths_in_obs: true

  # Optional
  fixed_target_position: null
  marker_number: 24

# =====================================================

rl_training_params:
  # Environment setup
  num_envs: 10

  # Training duration
  total_timesteps: 5000000

  # Evaluation
  eval_freq: 10000
  n_eval_episodes: 10
  render_mode: null

  # Checkpointing
  save_freq: 50000
  log_dir_base: "results"

  # PPO hyperparameters
  # for lesson_1 and lesson_2 it is 0,0001
  learning_rate: 0.0001 
  n_steps: 512
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.005
  target_kl: 0.12




# =====================================================

rl_evaluation:
  num_episodes: 10
  render_delay: 0.01
  deterministic_actions: true
  grid_size: 20
  space_limit: 0.2


# =====================================================

il:
  BC_epochs: 10
  BC_batch_size: 256
  trajectories: 600
  sample_for_one_trajectory: 700